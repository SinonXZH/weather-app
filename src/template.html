<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
</head>
<body>
    <header>
        <input type="text" name="city" id="city-input" placeholder="Search for a city...">
        <button>Search</button>
    </header>
    <main>
        <div class="weatherInfo">
            <h2 class="cityName">北京</h2>
            <p class="temperature">22°C</p>
            <p class="description">舒适</p>
            <p class="humidity"></p>
        </div>
        <div class="weatherWeekInfo">
            <div class="weatherWeekCard">
                <div class="weatherWeekCardTop">
                    <h2>周一</h2>
                    <img src="#">
                    <p>小雨转晴</p>
                </div>
                <div class="weatherWeekCardBot">
                    <h2>22~30摄氏度</h2>
                </div>
            </div>
        </div>
        <div class="weatherDayInfo">

        </div>
    </main>
</body>
</html>
